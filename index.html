<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="background-container">
        <img class="background" src="/pictures/background-image.jpg" alt="Mountain filled with ligth of stars at the sky">
        <div class="logo-header">
            <img src="/pictures/odin-lined.png" alt="White logo of Odin">
            <h1>ODIN</h1>
        </div>
        <div class="attribute">
            Photo by <a href="https://unsplash.com/@eberhardgross?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">eberhard grossgasteiger</a> on <a href="https://unsplash.com/s/photos/nature?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        </div>
    </div>
    <div class="form-container">
        <div class="info">
            <p class="first-sentence">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
            <p>You <em>know</em> you want to.</p>
        </div>
        <div class="fields">
            <p>Let's do this!</p>
            <form class="form-fields" action="example.com/path">
                <div class="form-name-email-password">
                    <label for="first_name">FIRST NAME</label>
                    <input type="text" name="first_name" id="first_name">

                    <label for="user_email">EMAIL</label>
                    <input type="email" name="user_email" id="user_email">

                    <label for="user_password">PASSWORD</label>
                    <input type="password" name="user_password" id="user_password" onkeyup="check();">
                </div>
                <div class="form-last-name-phone-password">
                    <label for="last_name">LAST NAME</label>
                    <input type="text" name="last_name" id="last_name">

                    <label for="phone_number">PHONE NUMBER</label>
                    <input type="text" name="phone_number" id="phone_number">

                    <label for="user_password2">CONFIRM PASSWORD</label>
                    <input type="password" name="user_password2" id="user_password2" onkeyup="check();">
                </div>
            </form>
            <div class="message"></div>
        </div>
        <div class="create-account">
            <button class="clickable">Create Account</button>
            <p>Already have an account? <a href="http://example.com">Log in</a></p>
        </div>
    </div>
        
    </html>
</body>
